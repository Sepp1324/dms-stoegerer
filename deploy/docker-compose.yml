# Lokale Entwicklungsumgebung.
# Für das k3s-Deployment siehe deploy/k8s/.
#
# Start:  docker compose -f deploy/docker-compose.yml up --build
# Danach: Backend http://localhost:8000  ·  Frontend (Dev) separat via `npm run dev`
#         oder das gebaute Frontend-Image auf http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dms}
      POSTGRES_USER: ${POSTGRES_USER:-dms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dms}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  backend:
    build: ../backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - dmsdata:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ../backend
    command: celery -A config worker -l info
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - dmsdata:/data
    depends_on:
      - backend
      - redis

  frontend:
    build: ../frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  dmsdata:
