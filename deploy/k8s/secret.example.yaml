# Vorlage. Kopieren nach secret.yaml, echte Werte eintragen und anwenden.
# secret.yaml ist via .gitignore vom Repository ausgeschlossen.
#
#   cp secret.example.yaml secret.yaml
#   # Werte eintragen
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: dms-secrets
  namespace: dms
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "bitte-langen-zufaelligen-wert-einsetzen"
  POSTGRES_PASSWORD: "bitte-sicheres-passwort"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
