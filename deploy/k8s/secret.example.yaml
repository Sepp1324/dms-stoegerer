# Vorlage. Kopieren nach secret.yaml, echte Werte eintragen und anwenden.
# secret.yaml ist via .gitignore vom Repository ausgeschlossen.
#
#   cp secret.example.yaml secret.yaml
#   # Werte eintragen
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: dms-secrets
  namespace: dms
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "bitte-langen-zufaelligen-wert-einsetzen"
  POSTGRES_PASSWORD: "bitte-sicheres-passwort"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  # IMAP-Postfach für die E-Mail-Ingestion (Stufe 3). Der Name dieser Variable
  # wird im Django-Admin am E-Mail-Konto unter "password_env" hinterlegt
  # (z. B. IMAP_PASSWORD). App-Passwort verwenden, nicht das Login-Passwort.
  IMAP_PASSWORD: ""
---
# Backup-Secrets: SSH-Zugang zum NAS für Offsite-Backup.
# NICHTS davon ins Repo committen (secret.yaml ist gitignored).
apiVersion: v1
kind: Secret
metadata:
  name: dms-backup-secrets
  namespace: dms
type: Opaque
stringData:
  # SSH-Zielhost (NAS im Heimnetz oder remote).
  BACKUP_SSH_HOST: "nas.example.com"
  # SSH-Benutzer auf dem NAS.
  BACKUP_SSH_USER: "backup-user"
  # SSH Private Key (PEM-Format, mehrzeilig). Beispiel:
  # -----BEGIN OPENSSH PRIVATE KEY-----
  # b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAABlwAAAAdzc2gtcn
  # ...
  # -----END OPENSSH PRIVATE KEY-----
  BACKUP_SSH_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    HIER_DEN_ECHTEN_PRIVATE_KEY_EINFÜGEN
    -----END OPENSSH PRIVATE KEY-----
  # Zielpfad auf dem NAS (absolut, z. B. /volume1/backups/dms).
  BACKUP_TARGET_PATH: "/volume1/backups/dms"
  # Aufbewahrung: Anzahl der letzten Backups, die behalten werden (ältere rotieren).
  BACKUP_RETENTION: "7"
