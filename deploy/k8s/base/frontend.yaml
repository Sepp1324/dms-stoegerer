apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: registry.stoegerer-home.at/dms-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # nginx muss auf den privilegierten Port 80 binden → NET_BIND_SERVICE
              # bleibt, alles andere fällt weg.
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits: {cpu: "250m", memory: "256Mi"}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dms
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
