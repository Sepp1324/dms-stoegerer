# Backup-CronJob: täglich Postgres-Dump + /data tar → offsite NAS via SSH/rsync.
#
# Architektur-Entscheidung (CTO): Offsite = bestehendes NAS (SSH/rsync), KEIN Cloud.
# Begründung: NAS bereits vorhanden (STOAA-167/197), Cloud würde laufende Kosten +
# Datenschutz-/CEO-Freigabe erfordern. "Offsite" = anderes Gerät als k3s-Node.
#
# Zugangsdaten (SSH-Key/Host/Pfad) aus Secret dms-backup-secrets (siehe secret.example.yaml).
# NICHTS davon ins Repo committen.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup
  namespace: dms
spec:
  # Täglich um 02:00 Uhr (Server-Lokalzeit).
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup
        spec:
          # NAS-Firewalls sehen sonst die Pod-CIDR (k3s/flannel: 10.42.0.0/16)
          # statt der Node-IP. Mit hostNetwork kommt SSH/rsync vom k3s-Node.
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          # Worker + Backend teilen die RWO-PVC dms-data → Backup-Job muss auf denselben Node.
          # (Ohne RWX-Storage kann das PVC nicht von mehreren Nodes aus gemountet werden.)
          # Wir nutzen dieselbe Affinität wie der Worker: Co-Location mit Backend.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: backend
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          containers:
            - name: backup
              # Nutzen das DMS-Backend-Image, das bereits pg_dump, tar, rsync, ssh enthält
              image: registry.stoegerer-home.at/dms-backend:0.5.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh"]
              args:
                - -c
                - |
                  set -e

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backup"
                  DB_BACKUP="${BACKUP_DIR}/db-${TIMESTAMP}.sql.gz"
                  DATA_BACKUP="${BACKUP_DIR}/data-${TIMESTAMP}.tar.gz"

                  mkdir -p "${BACKUP_DIR}"

                  echo "=== DMS Backup Start: ${TIMESTAMP} ==="

                  echo "--- pg_dump: postgres/${POSTGRES_DB} → ${DB_BACKUP}"
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h "${POSTGRES_HOST}" \
                    -U "${POSTGRES_USER}" \
                    -d "${POSTGRES_DB}" \
                    | gzip > "${DB_BACKUP}"

                  echo "--- tar: /data → ${DATA_BACKUP}"
                  tar -czf "${DATA_BACKUP}" \
                    -C /data \
                    archive thumbnails consume

                  echo "--- rsync → ${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}:${BACKUP_TARGET_PATH} (SSH-Port ${BACKUP_SSH_PORT:-22})"

                  SSH_KEY_FILE="/tmp/backup_ssh_key"
                  printf '%s\n' "${BACKUP_SSH_KEY}" > "${SSH_KEY_FILE}"
                  chmod 600 "${SSH_KEY_FILE}"

                  SSH_WRAPPER="/tmp/backup_ssh"
                  cat > "${SSH_WRAPPER}" <<EOF
                  #!/bin/sh
                  exec ssh -p "${BACKUP_SSH_PORT:-22}" \
                    -i "${SSH_KEY_FILE}" \
                    -o IdentitiesOnly=yes \
                    -o BatchMode=yes \
                    -o PreferredAuthentications=publickey \
                    -o StrictHostKeyChecking=no \
                    "\$@"
                  EOF
                  chmod 700 "${SSH_WRAPPER}"

                  "${SSH_WRAPPER}" "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" "echo SSH OK"

                  rsync -avz --progress \
                    -e "${SSH_WRAPPER}" \
                    "${DB_BACKUP}" "${DATA_BACKUP}" \
                    "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}:${BACKUP_TARGET_PATH}/

                  rm -f "${SSH_KEY_FILE}"

                  echo "--- Rotation: behalte letzte ${BACKUP_RETENTION} Backups"
                  printf '%s\n' "${BACKUP_SSH_KEY}" > "${SSH_KEY_FILE}"
                  chmod 600 "${SSH_KEY_FILE}"
                  SSH_OPTS="-p ${BACKUP_SSH_PORT:-22} -i ${SSH_KEY_FILE} -o IdentitiesOnly=yes -o BatchMode=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=no"

                  "${SSH_WRAPPER}" \
                    "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" \
                    "cd ${BACKUP_TARGET_PATH} && ls -t db-*.sql.gz | tail -n +$((BACKUP_RETENTION + 1)) | xargs -r rm -v && ls -t data-*.tar.gz | tail -n +$((BACKUP_RETENTION + 1)) | xargs -r rm -v"

                  rm -f "${SSH_KEY_FILE}"

                  echo "=== Backup abgeschlossen: ${TIMESTAMP} ==="
                  echo "DB:   ${DB_BACKUP}"
                  echo "Data: ${DATA_BACKUP}"
              envFrom:
                - configMapRef:
                    name: dms-config
                - secretRef:
                    name: dms-secrets
                - secretRef:
                    name: dms-backup-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backup-tmp
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: dms-data
            - name: backup-tmp
              emptyDir: {}
