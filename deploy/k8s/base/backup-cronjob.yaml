# Backup-CronJob: täglich Postgres-Dump + /data tar → offsite NAS via SSH/rsync.
#
# Architektur-Entscheidung (CTO): Offsite = bestehendes NAS (SSH/rsync), KEIN Cloud.
# Begründung: NAS bereits vorhanden (STOAA-167/197), Cloud würde laufende Kosten +
# Datenschutz-/CEO-Freigabe erfordern. "Offsite" = anderes Gerät als k3s-Node.
#
# Zugangsdaten (SSH-Key/Host/Pfad) aus Secret dms-backup-secrets (siehe secret.example.yaml).
# NICHTS davon ins Repo committen.
#
# Härtung (STOAA): activeDeadlineSeconds verhindert, dass ein hängender Lauf (z. B.
# rsync wartet auf die NAS) mit concurrencyPolicy=Forbid tagelang alle folgenden
# Läufe blockiert. Zusätzlich läuft die SSH-Vorabprüfung ganz am Anfang: ein
# abgelehnter Key scheitert in Sekunden mit klarer Statusmeldung (statt erst nach
# pg_dump+tar), damit das Monitoring den echten Grund zeigt.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup
  namespace: dms
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  # Verpasste Schedules (z. B. Node kurz weg) noch bis 10 min nachholen; danach
  # verfallen lassen (kein unkontrolliertes Nachfeuern).
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Sicherheitsnetz: ein einzelner Lauf darf nie länger als 1 h laufen. Läuft
      # er über (Hänger), wird er beendet → der nächste Schedule kann wieder starten
      # (sonst würde Forbid ihn dauerhaft aussperren).
      activeDeadlineSeconds: 3600
      # Höchstens 2 Wiederholungen pro Lauf; danach gilt der Job als Failed und der
      # Monitor meldet den Fehler (statt endloser Retries).
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: backup
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: backend
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: registry.stoegerer-home.at/dms-backend:46b8f61
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh"]
              args:
                - -c
                - |
                  set -e

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  MONITOR_OK=0
                  BACKUP_DIR="/backup"
                  DB_BACKUP="${BACKUP_DIR}/db-${TIMESTAMP}.sql.gz"
                  DATA_BACKUP="${BACKUP_DIR}/data-${TIMESTAMP}.tar.gz"

                  record_backup_status() {
                    size_arg=""
                    [ -n "$3" ] && size_arg="--size-bytes $3"
                    python manage.py record_backup_status \
                      --kind backup \
                      --status "$1" \
                      --artifact-timestamp "${TIMESTAMP}" \
                      --message "$2" $size_arg || true
                  }

                  on_exit() {
                    code=$?
                    if [ "$code" -ne 0 ] && [ "$MONITOR_OK" -ne 1 ]; then
                      record_backup_status failed "Backup-Job fehlgeschlagen (Exit ${code})"
                    fi
                  }
                  trap on_exit EXIT

                  mkdir -p "${BACKUP_DIR}"

                  echo "=== DMS Backup Start: ${TIMESTAMP} ==="
                  record_backup_status running "Backup-Job läuft"

                  # --- SSH-Key + Wrapper vorbereiten ---
                  SSH_KEY_FILE="/tmp/backup_ssh_key"
                  printf '%s\n' "${BACKUP_SSH_KEY}" > "${SSH_KEY_FILE}"
                  chmod 600 "${SSH_KEY_FILE}"

                  SSH_WRAPPER="/tmp/backup_ssh"
                  {
                    printf '#!/bin/sh\n'
                    printf 'exec ssh -p "%s" -i "%s" -o IdentitiesOnly=yes -o BatchMode=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=no "$@"\n' "${BACKUP_SSH_PORT:-22}" "${SSH_KEY_FILE}"
                  } > "${SSH_WRAPPER}"
                  chmod 700 "${SSH_WRAPPER}"

                  # --- SSH-Vorabprüfung: fail-fast mit klarer Ursache, BEVOR wir
                  #     pg_dump + tar verschwenden (ein abgelehnter Key war die
                  #     Ursache des 6-Tage-Ausfalls; das Monitoring soll das zeigen). ---
                  echo "--- SSH-Vorabprüfung: ${BACKUP_SSH_USER}@${BACKUP_SSH_HOST} (Port ${BACKUP_SSH_PORT:-22})"
                  if ! "${SSH_WRAPPER}" "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" "echo SSH OK"; then
                    record_backup_status failed "SSH-Auth zur NAS abgelehnt – Public-Key/authorized_keys + Rechte auf der NAS prüfen (Port ${BACKUP_SSH_PORT:-22})."
                    MONITOR_OK=1
                    echo "FEHLER: SSH-Auth zur NAS fehlgeschlagen – pg_dump/tar übersprungen." >&2
                    exit 1
                  fi

                  echo "--- pg_dump: postgres/${POSTGRES_DB} → ${DB_BACKUP}"
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h "${POSTGRES_HOST}" \
                    -U "${POSTGRES_USER}" \
                    -d "${POSTGRES_DB}" \
                    | gzip > "${DB_BACKUP}"

                  echo "--- tar: /data → ${DATA_BACKUP}"
                  # WICHTIG: ``originals`` MUSS mit gesichert werden – dort liegen die
                  # Dateien hinter DocumentVersion.file_path samt Hash-Beweiskette.
                  # Ohne sie ist ein Restore wertlos (P0). archive = OCR-PDFs,
                  # thumbnails = Vorschauen, consume = Eingang.
                  tar -czf "${DATA_BACKUP}" \
                    -C /data \
                    originals archive thumbnails consume

                  echo "--- Übertragung → ${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}:${BACKUP_TARGET_PATH}"
                  scp -O -S "${SSH_WRAPPER}" \
                    "${DB_BACKUP}" "${DATA_BACKUP}" \
                    "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}:${BACKUP_TARGET_PATH}/"

                  echo "--- Rotation: behalte letzte ${BACKUP_RETENTION} Backups"
                  "${SSH_WRAPPER}" \
                    "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" \
                    "cd ${BACKUP_TARGET_PATH} && ls -t db-*.sql.gz | tail -n +$((BACKUP_RETENTION + 1)) | xargs -r rm -v && ls -t data-*.tar.gz | tail -n +$((BACKUP_RETENTION + 1)) | xargs -r rm -v"

                  rm -f "${SSH_KEY_FILE}" "${SSH_WRAPPER}"
                  # Gesamtgröße der beiden Artefakte (Bytes) fürs Verlaufs-/Trend-Monitoring.
                  TOTAL_BYTES=$(( $(wc -c < "${DB_BACKUP}") + $(wc -c < "${DATA_BACKUP}") ))
                  record_backup_status success "Backup erfolgreich abgeschlossen" "${TOTAL_BYTES}"
                  MONITOR_OK=1

                  echo "=== Backup abgeschlossen: ${TIMESTAMP} ==="
                  echo "DB:   ${DB_BACKUP}"
                  echo "Data: ${DATA_BACKUP}"
              envFrom:
                - configMapRef:
                    name: dms-config
                - secretRef:
                    name: dms-secrets
                - secretRef:
                    name: dms-backup-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backup-tmp
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: dms-data
            - name: backup-tmp
              emptyDir: {}
