apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dms-data
  namespace: dms
spec:
  # RWO genügt im Einzel-Node-k3s; Backend + Worker laufen auf demselben Node.
  # Für Multi-Node später auf ein RWX-Volume (z. B. Longhorn/NFS) wechseln.
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Pod-weite Härtung (P2): seccomp + non-root. runAsUser 1000 (kein
      # Dockerfile-USER nötig – so bleibt das Backup-Image root). fsGroup macht
      # das bestehende /data-PVC gruppenschreibbar für uid 1000; OnRootMismatch
      # führt den (einmaligen) rekursiven chgrp nur aus, wenn nötig.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      # Migrationen einmalig vor dem Start des Web-Prozesses.
      initContainers:
        - name: migrate
          image: registry.stoegerer-home.at/dms-backend:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "256Mi"}
            limits: {cpu: "1", memory: "1Gi"}
          # HOME auf einen schreibbaren Pfad (uid 1000 hat keinen passwd-Eintrag,
          # sonst zeigt HOME auf "/" und Tools ohne eigenen Cache-Pfad scheitern).
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - configMapRef:
                name: dms-config
            - secretRef:
                name: dms-secrets
      containers:
        - name: backend
          image: registry.stoegerer-home.at/dms-backend:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - gunicorn
            - config.wsgi:application
            - --bind
            - 0.0.0.0:8000
            # Nur 2 Worker: die semantische Suche lädt e5-large PRO gunicorn-
            # Prozess (~2,5 GB); je mehr Worker, desto mehr Modell-Kopien. 2 reichen
            # für den Familien-Einsatz und deckeln den Speicherbedarf.
            - --workers
            - "2"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # Memory: die semantische Suche lädt e5-large mit onnxruntime 1.27 (Load-
          # Spike durch Graph-Optimierung). 3Gi reichten nicht (OOMKill/exit 137);
          # bei 2 gunicorn-Workern deckt 6Gi zwei Modell-Kopien + Web-Overhead.
          resources:
            requests: {cpu: "250m", memory: "1Gi"}
            limits: {cpu: "2", memory: "6Gi"}
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - configMapRef:
                name: dms-config
            - secretRef:
                name: dms-secrets
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              # Kubelet nutzt sonst die Pod-IP als Host → Django lehnt mit 400
              # (DisallowedHost) ab. localhost steht in ALLOWED_HOSTS.
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dms-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dms
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
