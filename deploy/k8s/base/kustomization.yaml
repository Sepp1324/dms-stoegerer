# Anwenden mit:  kubectl apply -k deploy/k8s
# Voraussetzung: zuvor secret.yaml aus secret.example.yaml erstellen und anwenden
# (oder hier temporär in resources aufnehmen – nicht ins Repo committen).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dms

# --- Bild-Tags: von CI automatisch gepflegt --------------------------------
# Die beiden newTags werden vom Deploy-Workflow NACH erfolgreichem, in der
# Registry verifiziertem Push automatisch auf den gebauten Git-SHA gesetzt und
# nach main zurückcommittet ([skip ci]):
#   - .github/workflows/deploy.yml        → Backend + Frontend (Push nach main)
#   - .github/workflows/deploy-frontend.yml → nur Frontend (workflow_dispatch)
# Dadurch zeigt `kubectl apply -k deploy/k8s` IMMER auf real vorhandene Images –
# nie mehr auf ein Geister-Tag (Ursache der ErrImagePull-Ausfälle 2026-07-05).
#
# Manuelles Editieren nur im Notfall und NUR auf einen Tag, der wirklich in der
# Registry liegt. Prüfen:
#   curl -sk https://registry.stoegerer-home.at/v2/dms-backend/tags/list
# Backend und Frontend dürfen unterschiedliche SHAs tragen (Frontend-only-Deploys
# pflegen ausschließlich den frontend-Tag).
images:
  - name: registry.stoegerer-home.at/dms-backend
    newTag: "0.5.0"    # CI-gepflegt – nächster Deploy setzt den echten SHA
  - name: registry.stoegerer-home.at/dms-frontend
    newTag: "df8abf1"  # CI-gepflegt – nächster Deploy setzt den echten SHA

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - celery.yaml
  - beat.yaml
  - frontend.yaml
  - ingress.yaml
  - backup-cronjob.yaml
