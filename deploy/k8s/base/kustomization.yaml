# Anwenden mit:  kubectl apply -k deploy/k8s   -- ABER vom GitOps-Branch
# ``cluster-state`` auschecken, NICHT von main! Der Deploy-Workflow pusht die
# CI-gepflegten newTags nach jedem erfolgreichen Rollout auf cluster-state (main
# ist branch-protected und bleibt beim alten Tag stehen). Nur cluster-state
# spiegelt die echten, in der Registry liegenden Cluster-Images. Siehe docs/ci-cd.md.
# Voraussetzung: zuvor secret.yaml aus secret.example.yaml erstellen und anwenden
# (oder hier temporär in resources aufnehmen – nicht ins Repo committen).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dms

# --- Bild-Tags: von CI automatisch gepflegt --------------------------------
# Die beiden newTags werden vom Deploy-Workflow NACH erfolgreichem, in der
# Registry verifiziertem Push automatisch auf den gebauten Git-SHA gesetzt und
# auf den GitOps-Branch ``cluster-state`` gepusht ([skip ci]):
#   - .github/workflows/deploy.yml        → Backend + Frontend
#   - .github/workflows/deploy-frontend.yml → nur Frontend (workflow_dispatch)
# In main (hier) bleiben die Werte bewusst „veraltet" – NUR cluster-state ist die
# GitOps-Wahrheit für `apply -k`. So zeigt der Cluster-Apply immer auf real
# vorhandene Images – nie auf ein Geister-Tag (ErrImagePull-Ausfälle 2026-07-05).
#
# Manuelles Editieren nur im Notfall und NUR auf einen Tag, der wirklich in der
# Registry liegt. Prüfen:
#   curl -sk https://registry.stoegerer-home.at/v2/dms-backend/tags/list
# Backend und Frontend dürfen unterschiedliche SHAs tragen (Frontend-only-Deploys
# pflegen ausschließlich den frontend-Tag).
images:
  - name: registry.stoegerer-home.at/dms-backend
    newTag: "0.5.0"    # CI-gepflegt – nächster Deploy setzt den echten SHA
  - name: registry.stoegerer-home.at/dms-frontend
    newTag: "df8abf1"  # CI-gepflegt – nächster Deploy setzt den echten SHA

# Der Namespace dms ist BEWUSST NICHT hier, sondern im einmaligen Bootstrap
# (deploy/k8s/bootstrap, Admin-only). Sonst enthielte jedes von der CD gerenderte
# `apply -k` ein cluster-scoped Namespace-Objekt, für das die namespacebeschränkte
# Deploy-Role (dms-deployer) keine Rechte hat -> Deploy schlägt fehl.
resources:
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - celery.yaml
  - beat.yaml
  - frontend.yaml
  - ingress.yaml
  - backup-cronjob.yaml
  - networkpolicy.yaml
