apiVersion: v1
kind: ConfigMap
metadata:
  name: dms-config
  namespace: dms
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "dms.stoegerer-home.at,localhost,backend"
  DJANGO_CORS_ORIGINS: "http://dms.stoegerer-home.at"
  POSTGRES_DB: "dms"
  POSTGRES_USER: "dms"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  DMS_DATA_DIR: "/data"
  # Consume-Ordner (Scanner-Eingang). Basis-Default = lokaler Pfad im dms-data-PVC.
  # Für NAS-Betrieb überschreibt das Overlay deploy/k8s/overlays/consume-nfs/
  # diesen Wert auf den NFS-Mount-Pfad /consume-nfs (siehe README).
  CONSUME_FOLDER_PATH: "/data/consume"
  # Beat-Intervalle in Sekunden (periodische Aufgaben).
  MAIL_FETCH_INTERVAL: "300"
  CONSUME_SCAN_INTERVAL: "120"
  # NFS-Reife-Check: Datei erst aufnehmen, wenn sie mind. so viele Sekunden
  # alt ist (verhindert Teil-Reads langsam über NFS geschriebener Scans).
  CONSUME_MIN_AGE: "15"
  # Standard-Eigentümer für Ingest ohne direkten Owner (STOAA-295, Username).
  # Leer = bewusste Admin-Triage (owner=None, via GET /api/documents/?owner=none
  # sichtbar, per POST .../set-owner/ zuweisbar). MAIL_DEFAULT_OWNER greift, wenn
  # ein MailAccount keinen owner hat; CONSUME_DEFAULT_OWNER im Flat-Consume-Modus
  # (Per-User-Modus setzt den Owner selbst). Keine Migration.
  MAIL_DEFAULT_OWNER: ""
  CONSUME_DEFAULT_OWNER: ""
  AI_PROVIDER: "anthropic"
  AI_MODEL: "claude-opus-4-8"
  OLLAMA_BASE_URL: "http://ollama:11434"
  # ASN-Barcode-Erkennung (STOAA-515): Code128 + QR via pyzbar/libzbar0.
  # Fehlt libzbar0 im Image → WARN + Fallback auf OCR-Text, kein Pipeline-Crash.
  ASN_BARCODE_ENABLED: "true"
  ASN_BARCODE_PREFIX: "ASN"
  ASN_BARCODE_DPI: "300"
  # Leer = alle Seiten; komma-getrennte 1-basierte Seitenzahlen z. B. "1,2"
  ASN_BARCODE_PAGES: ""

  # --- Kalibrierte Embedding-Schwellen (aus calibrate_embeddings am echten Bestand) ---
  # e5 komprimiert diesen (rechnungslastigen) Korpus in ein sehr enges, hohes Band
  # (Nachbar-Ähnlichkeit p50≈0.968, min≈0.88, max≈0.98). Die Code-Defaults (0.70/0.93)
  # waren dafür viel zu niedrig (fast alles galt als Dublette). Werte hier ersetzen
  # die Defaults per Env – kein Rebuild nötig, greifen beim nächsten Rollout.
  #
  # Dubletten bewusst präzisionslastig (lieber wenige, sichere Treffer als Fehlalarme
  # bei den vielen gleich-vorlagigen Rechnungen): "Duplikat" nur ganz oben, "mögliche
  # Version" ab ~p95.
  DUPLICATE_STRONG_THRESHOLD: "0.980"
  DUPLICATE_THRESHOLD: "0.975"
  # Such-Floor (Query→Passage liegt niedriger als Doc→Doc): recall-first, die
  # Hybrid-Suche liefert Präzision über den Volltext-Teil.
  EMBEDDING_MIN_SIMILARITY: "0.75"
  # Autopilot-Auslöseschwelle ist ein Stimmenanteil (nicht die rohe Cosine-Distanz),
  # daher von der Kompression unabhängig – 0.75 bleibt eine solide Bar.
  AUTO_FILE_MIN_CONFIDENCE: "0.75"
