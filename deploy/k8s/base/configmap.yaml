apiVersion: v1
kind: ConfigMap
metadata:
  name: dms-config
  namespace: dms
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "dms.stoegerer-home.cloud,localhost,backend"
  DJANGO_CORS_ORIGINS: "http://dms.stoegerer-home.cloud"
  POSTGRES_DB: "dms"
  POSTGRES_USER: "dms"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  DMS_DATA_DIR: "/data"
  # onnxruntime/OpenMP-Threads deckeln: ungedeckelt startet onnxruntime so viele
  # Threads wie die NODE CPUs (nicht das Container-Limit), jeder mit Speicher-
  # Arenen -> e5-large sprengte das Pod-Memory (OOMKill/exit 137). Ergänzt das
  # code-seitige EMBEDDING_THREADS (fastembed intra-op).
  OMP_NUM_THREADS: "2"
  # Semantische Suche wieder AN – jetzt mit dem kleinen mehrsprachigen MiniLM
  # (384-dim, ~470 MB) statt e5-large (2,2 GB, OOMte selbst mit 8Gi). MiniLM
  # braucht KEINE e5-Prefixe (Default leer). EMBEDDING_DIM muss zur Migration 0047
  # (384) passen.
  EMBEDDING_ENABLED: "true"
  EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  EMBEDDING_DIM: "384"
  EMBEDDING_THREADS: "2"
  # Consume-Ordner (Scanner-Eingang). Basis-Default = lokaler Pfad im dms-data-PVC.
  # Für NAS-Betrieb überschreibt das Overlay deploy/k8s/overlays/consume-nfs/
  # diesen Wert auf den NFS-Mount-Pfad /consume-nfs (siehe README).
  CONSUME_FOLDER_PATH: "/data/consume"
  # Beat-Intervalle in Sekunden (periodische Aufgaben).
  MAIL_FETCH_INTERVAL: "300"
  CONSUME_SCAN_INTERVAL: "120"
  # NFS-Reife-Check: Datei erst aufnehmen, wenn sie mind. so viele Sekunden
  # alt ist (verhindert Teil-Reads langsam über NFS geschriebener Scans).
  CONSUME_MIN_AGE: "15"
  # Standard-Eigentümer für Ingest ohne direkten Owner (STOAA-295, Username).
  # Leer = bewusste Admin-Triage (owner=None, via GET /api/documents/?owner=none
  # sichtbar, per POST .../set-owner/ zuweisbar). MAIL_DEFAULT_OWNER greift, wenn
  # ein MailAccount keinen owner hat; CONSUME_DEFAULT_OWNER im Flat-Consume-Modus
  # (Per-User-Modus setzt den Owner selbst). Keine Migration.
  MAIL_DEFAULT_OWNER: ""
  CONSUME_DEFAULT_OWNER: ""
  AI_PROVIDER: "anthropic"
  AI_MODEL: "claude-opus-4-8"
  OLLAMA_BASE_URL: "http://ollama:11434"
  # --- psychosr-Auto-Lernkarten ---
  # Dokument mit Trigger-Tag -> DMS generiert MC-Fragen -> push an psychosr.
  # PSYCHOSR_URL leer = Automatik aus. PSYCHOSR_TOKEN liegt im Secret.
  PSYCHOSR_URL: "https://psychosr.stoegerer-home.cloud"
  PSYCHOSR_TRIGGER_TAG: "Psychologie"
  PSYCHOSR_SYNCED_TAG: "psychosr-synced"
  PSYCHOSR_DECK: "mc"
  PSYCHOSR_MAX_QUESTIONS: "8"
  # ASN-Barcode-Erkennung (STOAA-515): Code128 + QR via pyzbar/libzbar0.
  # Fehlt libzbar0 im Image → WARN + Fallback auf OCR-Text, kein Pipeline-Crash.
  ASN_BARCODE_ENABLED: "true"
  ASN_BARCODE_PREFIX: "ASN"
  ASN_BARCODE_DPI: "300"
  # Leer = alle Seiten; komma-getrennte 1-basierte Seitenzahlen z. B. "1,2"
  ASN_BARCODE_PAGES: ""

  # --- Kalibrierte Embedding-Schwellen (aus calibrate_embeddings am echten Bestand) ---
  # MiniLM-L12-v2 (Umstieg von e5-large, s. #253) staucht diesen rechnungslastigen
  # Korpus hoch zusammen: Nachbar-Ähnlichkeit p50≈0.930, max≈0.944 – und die Top-
  # Paare bei 0.93–0.94 sind VERSCHIEDENE Dokumente (gleiche Vorlage/Absender). Ein
  # echtes Duplikat läge bei ~0.98–1.0. Die Schwellen liegen daher ÜBER der 0.944-
  # Decke, damit die 52% Same-Template-Rechnungen keine Fehlalarme werfen.
  # (Alte e5-Werte waren 0.975/0.980/0.75 – für MiniLM unbrauchbar, weil > max.)
  DUPLICATE_STRONG_THRESHOLD: "0.98"
  DUPLICATE_THRESHOLD: "0.96"
  # Such-Floor (Query→Passage liegt niedriger als Doc→Doc): leicht angehoben ggü.
  # e5 (0.75), da MiniLM generell höher liegt. Bei Bedarf an echten Suchen justieren.
  EMBEDDING_MIN_SIMILARITY: "0.82"
  # Autopilot-Auslöseschwelle ist ein Stimmenanteil (nicht die rohe Cosine-Distanz),
  # daher von der Kompression unabhängig – 0.75 bleibt eine solide Bar.
  AUTO_FILE_MIN_CONFIDENCE: "0.75"
