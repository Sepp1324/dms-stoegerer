# Ingress über Traefik (in k3s standardmäßig installiert).
# /api,/admin,/static -> Backend,  alles andere -> Frontend (SPA).
# Hostname dms.stoegerer-home.cloud per DNS (UDM) auf eine Node-IP zeigen lassen.
#
# TLS: Der Router hört auf web UND websecure; das Zertifikat liefert cert-manager
# über eine interne Cluster-CA in das Secret ``dms-tls`` (siehe deploy/k8s/tls/).
# HTTP wird global auf HTTPS umgeleitet (Traefik-Entrypoint-Redirect, siehe
# deploy/k8s/tls/traefik-redirect.yaml). Bevor cert-manager + tls-Overlay
# eingerichtet sind, existiert ``dms-tls`` nicht → Traefik nutzt sein Default-Cert
# (unverändertes Verhalten, kein harter Fehler).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dms
  namespace: dms
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dms.stoegerer-home.cloud
      secretName: dms-tls
  rules:
    - host: dms.stoegerer-home.cloud
      http:
        paths:
          # API, Django-Admin und dessen Static-Dateien → Backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Alles andere → Frontend (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
