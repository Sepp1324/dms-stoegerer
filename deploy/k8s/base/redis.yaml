apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dms
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
