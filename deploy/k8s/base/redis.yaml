apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          # Auth (P2): requirepass aus dem Secret; k8s substituiert $(REDIS_PASSWORD)
          # aus der unten deklarierten Env. Ohne Passwort war Redis (Broker +
          # potentieller Cache) für jeden im Cluster-Netz offen.
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: REDIS_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dms
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
