apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: dms
spec:
  accessModes: ["ReadWriteOnce"]
  # Kein storageClassName -> Cluster-Default (k3s: local-path). Broker + AOF eines
  # Familien-DMS sind winzig; 1Gi ist reichlich.
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dms
spec:
  replicas: 1
  # Recreate statt RollingUpdate: Single-Replica + RWO-PVC. Beim Rolling-Update
  # liefen kurz zwei Pods, die beide dasselbe ReadWriteOnce-PVC mounten wollten
  # -> Multi-Attach-Fehler. Recreate fährt den alten Pod ZUERST herunter.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        # Das PVC gehört sonst root; fsGroup 999 macht den Mount für den
        # redis-User (GID 999, s. runAsUser unten) gruppen-schreibbar. Ohne das
        # scheitert AOF/RDB an 'Permission denied' -> MISCONF -> Writes blockiert.
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          # Auth (P2): requirepass aus dem Secret; k8s substituiert $(REDIS_PASSWORD)
          # aus der unten deklarierten Env. Ohne Passwort war Redis (Broker +
          # potentieller Cache) für jeden im Cluster-Netz offen.
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            # Durabilität: AOF (append-only file) protokolliert jeden Write und
            # überlebt Pod-Neustarts/Node-Ausfall -> wartende Celery-Aufträge gehen
            # nicht mehr verloren (P2). Liegt zusammen mit RDB im gemounteten /data.
            - --appendonly
            - "yes"
            # Broker-Resilienz: ein fehlgeschlagener RDB-Snapshot darf NICHT alle
            # Writes blockieren (sonst MISCONF -> jeder Celery-Enqueue 500/503).
            # Mit schreibbarem PVC tritt das zwar nicht mehr auf, bleibt aber als
            # Sicherheitsnetz gegen transiente Persistenz-Hänger.
            - --stop-writes-on-bgsave-error
            - "no"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: REDIS_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            # Als 'redis'-User des Images (UID/GID 999) laufen – genau dem gehört
            # /data. Ohne explizites runAsUser startete der Pod (Cluster-Non-Root-
            # Default) unter einer FREMDEN UID → redis-server konnte sein eigenes
            # /data nicht beschreiben → bgsave 'Permission denied' → MISCONF →
            # Writes blockiert. 999 = deterministischer Schreibzugriff.
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dms
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
