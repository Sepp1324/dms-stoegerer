apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          # Auth (P2): requirepass aus dem Secret; k8s substituiert $(REDIS_PASSWORD)
          # aus der unten deklarierten Env. Ohne Passwort war Redis (Broker +
          # potentieller Cache) für jeden im Cluster-Netz offen.
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            # Broker-Resilienz: ein fehlgeschlagener RDB-Snapshot darf NICHT alle
            # Writes blockieren. Sonst kippt ein Persistenz-Hänger (z. B. /data nicht
            # schreibbar) Redis in MISCONF und JEDER Celery-Enqueue → 500 (rewrite/
            # merge/split der PDF-Werkbank, Ingest, Reindex …). Persistenz ist hier
            # ohnehin ephemer (kein Volume gemountet), daher unkritisch.
            - --stop-writes-on-bgsave-error
            - "no"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: REDIS_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            # Als 'redis'-User des Images (UID/GID 999) laufen – genau dem gehört
            # /data. Ohne explizites runAsUser startete der Pod (Cluster-Non-Root-
            # Default) unter einer FREMDEN UID → redis-server konnte sein eigenes
            # /data nicht beschreiben → bgsave 'Permission denied' → MISCONF →
            # Writes blockiert. 999 = deterministischer Schreibzugriff.
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dms
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
