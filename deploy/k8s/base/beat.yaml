apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: dms
spec:
  # Genau EINE Beat-Instanz, sonst würden Tasks doppelt geplant.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: beat
          image: registry.stoegerer-home.at/dms-backend:0.1.0
          imagePullPolicy: IfNotPresent
          # Beat plant nur (dispatcht Tasks an den Worker) – kein Daten-Volume nötig.
          # Der Zeitplan steht in den Settings (CELERY_BEAT_SCHEDULE); die
          # Schedule-Datei liegt ephemer in /tmp.
          command:
            - celery
            - -A
            - config
            - beat
            - -l
            - info
            - --schedule
            - /tmp/celerybeat-schedule
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits: {cpu: "250m", memory: "256Mi"}
          envFrom:
            - configMapRef:
                name: dms-config
            - secretRef:
                name: dms-secrets
