apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: dms
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # k3s bringt den local-path-Provisioner mit (Standard-StorageClass).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Ownership-Guard (STOAA): Der Wechsel von postgres:16-alpine (postgres-User
      # = uid 70) auf das pgvector/Debian-Image (uid 999) hat die Mount-Wurzel
      # /var/lib/postgresql/data mit uid 70 / Modus 0700 zurückgelassen. Der neue
      # Prozess (uid 999) durfte das Verzeichnis nicht betreten und crashte beim
      # mkdir ("Permission denied") -> Crash-Loop -> DB weg -> Login weg.
      # Dieser Root-initContainer stellt die Ownership der Mount-Wurzel vor JEDEM
      # Start sicher (idempotent, non-recursive – nur der Mount-Punkt selbst; die
      # pgdata-Inhalte heilt der postgres-Entrypoint als root selbst). Verhindert
      # einen erneuten Crash-Loop bei künftigen Image-/uid-Wechseln.
      initContainers:
        - name: fix-pgdata-perms
          # Gleiches Image wie der Hauptcontainer -> kein zusätzlicher Pull (bereits
          # auf den Nodes vorhanden); läuft standardmäßig als root (uid 0).
          image: pgvector/pgvector:pg16
          command: ["sh", "-c", "chown 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          # pgvector-Image (Postgres 16 + vector-Extension) für die semantische
          # Suche. Datenformat identisch zu postgres:16 – bestehendes PVC bleibt
          # kompatibel (gleiche PG-Major-Version).
          image: pgvector/pgvector:pg16
          envFrom:
            - configMapRef:
                name: dms-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: POSTGRES_PASSWORD
            # Daten in ein Unterverzeichnis legen, nicht direkt in den Mount-Punkt.
            # Verhindert den initdb-Fehler "directory exists but is not empty"
            # (lost+found), wenn das PVC auf einem eigenen Dateisystem liegt.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dms"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dms
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
