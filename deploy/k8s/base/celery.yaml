# Worker-Deployment (Celery: OCR-Pipeline + Consume-Scanner).
#
# Consume-Ordner: Die Basis nutzt den lokalen Pfad DMS_DATA_DIR/consume
# (= /data/consume, ConfigMap CONSUME_FOLDER_PATH). Für den NAS-Betrieb wird
# ein separates NFS-Volume als Overlay zugeschaltet – NICHT hier in der Basis,
# damit das CD-Deployment (deploy.yml → `kubectl apply -k deploy/k8s`) ohne
# echten NFS-Server nicht am Worker-Rollout hängen bleibt.
# Aktivierung: deploy/k8s/overlays/consume-nfs/ (siehe README).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      # Worker + Backend teilen die RWO-PVC dms-data → müssen auf denselben Node.
      # (Ohne local-path gibt es keine automatische Node-Bindung; wir erzwingen
      #  Co-Location. Alternative: RWX-Storage, dann kann diese Affinität weg.)
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: backend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: registry.stoegerer-home.at/dms-backend:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "info"]
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # OCR (Tesseract/Ghostscript) + e5-Embeddings sind speicherhungrig. Das
          # Laden von e5-large mit onnxruntime 1.27 (Graph-Optimierung) spikte über
          # 4Gi (OOMKill/exit 137); die Node hat ~11Gi frei -> Limit auf 8Gi. Hier
          # laufen Reindex + Pipeline-Embedding (Uploads).
          resources:
            requests: {cpu: "250m", memory: "1Gi"}
            limits: {cpu: "2", memory: "8Gi"}
          envFrom:
            - configMapRef:
                name: dms-config
            - secretRef:
                name: dms-secrets
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dms-data
