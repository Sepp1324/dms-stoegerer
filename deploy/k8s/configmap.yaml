apiVersion: v1
kind: ConfigMap
metadata:
  name: dms-config
  namespace: dms
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "dms.stoegerer-home.at,localhost,backend"
  DJANGO_CORS_ORIGINS: "http://dms.stoegerer-home.at"
  POSTGRES_DB: "dms"
  POSTGRES_USER: "dms"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  DMS_DATA_DIR: "/data"
  # Consume-Ordner: separates NFS-Volume (siehe celery.yaml).
  # Der Scanner schreibt direkt auf die NAS-Freigabe; der Worker liest von dort.
  CONSUME_FOLDER_PATH: "/consume-nfs"
  # Beat-Intervalle in Sekunden (periodische Aufgaben).
  MAIL_FETCH_INTERVAL: "300"
  CONSUME_SCAN_INTERVAL: "120"
  # NFS-Reife-Check: Datei erst aufnehmen, wenn sie mind. so viele Sekunden
  # alt ist (verhindert Teil-Reads langsam über NFS geschriebener Scans).
  CONSUME_MIN_AGE: "15"
  AI_PROVIDER: "anthropic"
  AI_MODEL: "claude-opus-4-8"
  OLLAMA_BASE_URL: "http://ollama:11434"
