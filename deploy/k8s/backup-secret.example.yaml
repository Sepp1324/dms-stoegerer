# Vorlage für das Backup-Offsite-Ziel. Kopieren nach backup-secret.yaml, echte
# Werte eintragen und anwenden. backup-secret.yaml ist via .gitignore vom
# Repository ausgeschlossen – NIEMALS echte Zugangsdaten committen.
#
#   cp backup-secret.example.yaml backup-secret.yaml
#   # rclone.conf-Block mit echtem Ziel + Credentials füllen
#   kubectl apply -f backup-secret.yaml
#
# Der CronJob (backup-cronjob.yaml) liest dieses Secret als rclone-Konfiguration
# (RCLONE_CONFIG=/config/rclone.conf) und lädt die Artefakte nach
# "$RCLONE_REMOTE" (Default "offsite:dms-backup" – der Remote-Name MUSS zum
# Abschnitt [offsite] unten passen).
#
# Architekturentscheidung (CTO): rclone als Transport, weil damit EIN Mechanismus
# viele Ziele bedient und die Zugangsdaten sauber in genau diesem Secret bleiben:
#   * Empfehlung/Default kostenlos: SFTP auf das vorhandene NAS (Beispiel unten).
#   * Alternativen ohne Manifest-Änderung: S3/MinIO, Backblaze B2, WebDAV, u. v. m.
#     (echte Cloud-Ziele = laufende Kosten → vorab mit CEO/Eigentümer abstimmen).
apiVersion: v1
kind: Secret
metadata:
  name: dms-backup-secret
  namespace: dms
type: Opaque
stringData:
  # Komplette rclone-Konfiguration. Der Abschnittsname ([offsite]) muss zum
  # RCLONE_REMOTE im CronJob passen. Beispiel: SFTP auf das NAS.
  rclone.conf: |
    [offsite]
    type = sftp
    host = NAS-HOST-ODER-IP
    user = backup-user
    # Passwort ist OBFUSCATED (nicht Klartext!): mit
    #   rclone obscure 'DEIN-PASSWORT'
    # erzeugen und hier einsetzen. Alternativ key_file für SSH-Key nutzen.
    pass = OBSCURED-PASSWORT-HIER
    # Zielverzeichnis auf dem NAS (muss existieren/beschreibbar sein):
    # der CronJob legt darunter je Lauf einen Zeitstempel-Ordner an.
    # -> RCLONE_REMOTE "offsite:dms-backup" schreibt nach <home>/dms-backup/.

    # --- Alternative S3/MinIO (statt des SFTP-Blocks oben) -------------------
    # [offsite]
    # type = s3
    # provider = Minio            # oder AWS, Wasabi, Backblaze ...
    # access_key_id = ...
    # secret_access_key = ...
    # endpoint = https://minio.example.at
    # region = us-east-1
    # -> RCLONE_REMOTE dann z. B. "offsite:mein-bucket/dms-backup".
