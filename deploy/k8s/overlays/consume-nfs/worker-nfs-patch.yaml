# Strategic-Merge-Patch: separates NFS-Volume in den Worker-Pod mounten.
# Merge-Key ist `name` → volumeMount + volume `consume-nfs` werden ergänzt,
# `data` (dms-data, RWO) und die podAffinity bleiben unangetastet.
#
# Platzhalter vor der Aktivierung ersetzen (kein Secret/keine IP ins Git):
#   server: <NAS-IP oder DNS-Name>
#   path:   <NFS-Export-Pfad, z. B. /volume1/dms-consume>
#
# STOAA-434 NFS Permission Fix:
# securityContext stellt sicher, dass der Worker-Prozess mit einer UID/GID läuft,
# die kompatibel mit den NFS-Berechtigungen ist. Synology NFS root_squash mappt
# root (UID 0) auf nobody; wir setzen explizit UID/GID 1000, damit der Worker
# Dateien auf dem NFS-Share lesen, schreiben und löschen kann.
#
# Abstimmung mit Synology NFS Export (empfohlen):
#   /volume1/dms-consume  <cluster-subnet>(rw,sync,no_subtree_check,all_squash,anonuid=1000,anongid=1000)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dms
spec:
  template:
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          volumeMounts:
            - name: consume-nfs
              mountPath: /consume-nfs
      volumes:
        - name: consume-nfs
          nfs:
            server: NFS_SERVER_PLACEHOLDER
            path: NFS_EXPORT_PATH_PLACEHOLDER
            readOnly: false
