# Tägliches Offsite-Backup von Datenbank UND Dateiablage (/data).
#
# Ablauf (ein Pod, zwei Schritte):
#   1. initContainer "dump" (postgres:16-alpine):
#        - pg_dump der DMS-DB über den postgres-Service (Creds aus dms-secrets)
#        - tar czf der revisionssicheren Ablage (/data: originals, archive,
#          thumbnails) – consume/ ist transienter Eingang und wird NICHT gesichert
#        - Integritätsprüfung (gzip -t) + SHA256SUMS; alles in ein Staging-emptyDir
#   2. Container "upload" (rclone): lädt das Staging-Verzeichnis offsite und
#        wendet die Aufbewahrung an (letzte N Backups behalten).
#
# Offsite-Ziel: konfigurierbar über rclone. Das rclone-Remote (Zugangsdaten)
# liegt ausschließlich im gitignored Secret "dms-backup-secret" (rclone.conf) –
# siehe backup-secret.example.yaml. So sind SFTP aufs NAS (kostenlos, Default-
# Empfehlung), S3/MinIO oder ein Cloud-Ziel ohne Manifest-Änderung wählbar.
#
# Robustheit: RWO-PVC dms-data wird read-only auf demselben Node wie das Backend
# gemountet (podAffinity analog worker). Jeder Fehlerschritt bricht den Job
# sichtbar ab (set -eu, gzip -t, rclone check) → kein halbes Artefakt gilt als
# gültig; der Job-Status wird "Failed". Der postgres-Client wird über den Service
# angesprochen, daher ist keine Node-Bindung an die DB nötig.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dms-backup
  namespace: dms
spec:
  # Täglich 02:30 (ruhige Zeit). timeZone: Kubernetes >= 1.27 / k3s aktuell.
  schedule: "30 2 * * *"
  timeZone: "Europe/Vienna"
  # Kein Parallellauf; verpasste Läufe (Node down) nicht nachholen-stapeln.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: dms-backup
        spec:
          restartPolicy: Never
          # Auf denselben Node wie das Backend – die RWO-PVC dms-data lässt sich
          # sonst nicht mitmounten (analog worker in celery.yaml).
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: backend
                  topologyKey: kubernetes.io/hostname
          initContainers:
            - name: dump
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              # POSTGRES_DB/USER/HOST/PORT kommen aus der ConfigMap.
              envFrom:
                - configMapRef:
                    name: dms-config
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: dms-secrets
                      key: POSTGRES_PASSWORD
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  TS="$(date -u +%Y%m%d-%H%M%S)"
                  OUT="/staging/$TS"
                  mkdir -p "$OUT"

                  echo "[backup] pg_dump ${POSTGRES_DB}@${POSTGRES_HOST} -> db.sql.gz"
                  # Dump ohne Pipe schreiben, damit ein pg_dump-Fehler direkt
                  # (set -e) abbricht und kein leeres gzip als gültig durchgeht.
                  pg_dump -h "$POSTGRES_HOST" -p "${POSTGRES_PORT:-5432}" \
                    -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                    --no-owner --format=plain > "$OUT/db.sql"
                  gzip "$OUT/db.sql"
                  gzip -t "$OUT/db.sql.gz"

                  echo "[backup] tar /data -> data.tar.gz"
                  cd /data
                  DIRS=""
                  for d in originals archive thumbnails; do
                    [ -d "$d" ] && DIRS="$DIRS $d"
                  done
                  if [ -z "$DIRS" ]; then
                    echo "[backup] FEHLER: keine Datenverzeichnisse in /data gefunden" >&2
                    exit 1
                  fi
                  tar czf "$OUT/data.tar.gz" $DIRS
                  gzip -t "$OUT/data.tar.gz"

                  ( cd "$OUT" && sha256sum db.sql.gz data.tar.gz > SHA256SUMS )
                  echo "[backup] Staging fertig:"
                  ls -l "$OUT"
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: staging
                  mountPath: /staging
          containers:
            - name: upload
              image: rclone/rclone:1.66.0
              imagePullPolicy: IfNotPresent
              env:
                # rclone-Konfiguration (Remote + Zugangsdaten) aus dem Secret.
                - name: RCLONE_CONFIG
                  value: /config/rclone.conf
                # Ziel: <remote-name aus rclone.conf>:<pfad>. Nur der Name ist
                # geheim (in rclone.conf); Pfad/Retention hier steuerbar.
                - name: RCLONE_REMOTE
                  value: "offsite:dms-backup"
                - name: BACKUP_RETENTION
                  value: "14"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  : "${RCLONE_REMOTE:?RCLONE_REMOTE nicht gesetzt}"
                  KEEP="${BACKUP_RETENTION:-14}"
                  TS="$(ls /staging)"
                  if [ -z "$TS" ]; then
                    echo "[backup] FEHLER: kein Staging-Verzeichnis vorhanden" >&2
                    exit 1
                  fi

                  echo "[backup] upload /staging/$TS -> $RCLONE_REMOTE/$TS"
                  rclone mkdir "$RCLONE_REMOTE/$TS"
                  rclone copy --checksum "/staging/$TS" "$RCLONE_REMOTE/$TS"
                  # Verifikation: alle Dateien offsite angekommen (Prüfsumme).
                  rclone check --one-way "/staging/$TS" "$RCLONE_REMOTE/$TS"

                  echo "[backup] Retention: $KEEP Backups behalten, ältere entfernen"
                  DIRS="$(rclone lsf --dirs-only "$RCLONE_REMOTE" | sed 's#/$##' | sort)"
                  TOTAL="$(printf '%s\n' "$DIRS" | grep -c . || true)"
                  REMOVE=$((TOTAL - KEEP))
                  if [ "$REMOVE" -gt 0 ]; then
                    printf '%s\n' "$DIRS" | head -n "$REMOVE" | while IFS= read -r d; do
                      [ -n "$d" ] || continue
                      echo "[backup] entferne altes Backup $d"
                      rclone purge "$RCLONE_REMOTE/$d"
                    done
                  fi
                  echo "[backup] fertig."
              volumeMounts:
                - name: staging
                  mountPath: /staging
                  readOnly: true
                - name: rclone-config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: dms-data
            - name: staging
              emptyDir: {}
            - name: rclone-config
              secret:
                secretName: dms-backup-secret
                items:
                  - key: rclone.conf
                    path: rclone.conf
