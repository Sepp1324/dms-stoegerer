apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: dms
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # k3s bringt den local-path-Provisioner mit (Standard-StorageClass).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: dms-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: POSTGRES_PASSWORD
            # Daten in ein Unterverzeichnis legen, nicht direkt in den Mount-Punkt.
            # Verhindert den initdb-Fehler "directory exists but is not empty"
            # (lost+found), wenn das PVC auf einem eigenen Dateisystem liegt.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dms"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dms
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
