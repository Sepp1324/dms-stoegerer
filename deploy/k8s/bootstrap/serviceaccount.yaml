# Least-Privilege-Deploy-Identität für den self-hosted GitHub-Actions-Runner.
#
# Der Runner braucht KEINE cluster-admin-Kubeconfig (/etc/rancher/k3s/k3s.yaml,
# world-readable = Admin-Credentials für jeden lokalen Nutzer/Dienst lesbar).
# Stattdessen ein ServiceAccount im dms-Namespace, dessen Rechte NUR auf die
# Ressourcen beschränkt sind, die deploy.yml / deploy-frontend.yml anfassen
# (apply -k + rollout status + set image + Diagnose describe/logs).
#
# EINMALIG als Cluster-Admin anwenden:
#   kubectl apply -f deploy/k8s/deploy-serviceaccount.yaml
# Danach eine 0600-Kubeconfig mit einem SA-Token erzeugen (siehe docs/ci-cd.md
# §1 "Kubeconfig-Zugriff") und im Workflow KUBECONFIG darauf zeigen lassen.
#
# Der Namespace dms selbst ist cluster-scoped und wird bewusst NICHT von diesem
# SA verwaltet – er wird einmalig vom Admin angelegt (deploy/k8s/base/namespace).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dms-deployer
  namespace: dms
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dms-deployer
  namespace: dms
rules:
  # Kern-Workloads, die apply -k rendert + der Rollout beobachtet.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # rollout status / Diagnose lesen die von Deployments verwalteten ReplicaSets & Pods.
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Übrige vom consume-nfs-Overlay gerenderte, namespaced Ressourcen.
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dms-deployer
  namespace: dms
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dms-deployer
subjects:
  - kind: ServiceAccount
    name: dms-deployer
    namespace: dms
