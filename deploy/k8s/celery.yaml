# Worker-Deployment mit separatem NFS-Volume für den Consume-Ordner.
#
# IMAGE-REBUILD: NEIN. Das NFS-Volume wird vom Kubelet auf dem **Node** gemountet,
# nicht im Container. Voraussetzung: `nfs-common` (Debian/Ubuntu) bzw. `nfs-utils`
# (RHEL/CentOS) auf dem Node installiert. Das Backend-Image bleibt unverändert.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      # Worker + Backend teilen die RWO-PVC dms-data → müssen auf denselben Node.
      # (Ohne local-path gibt es keine automatische Node-Bindung; wir erzwingen
      #  Co-Location. Alternative: RWX-Storage, dann kann diese Affinität weg.)
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: backend
              topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: registry.stoegerer-home.at/dms-backend:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "info"]
          envFrom:
            - configMapRef:
                name: dms-config
            - secretRef:
                name: dms-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: consume-nfs
              mountPath: /consume-nfs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dms-data
        # Separates NFS-Volume für den Consume-Ordner (Scanner-Eingang).
        # Konfiguration: NFS_SERVER und NFS_EXPORT_PATH per kustomize-Overlay
        # oder ConfigMap-Generator setzen (nicht hier hartkodieren).
        # Der Mount erfolgt auf Node-Ebene – nfs-common muss auf dem Node
        # installiert sein (kein Image-Rebuild nötig).
        - name: consume-nfs
          nfs:
            server: NFS_SERVER_PLACEHOLDER
            path: NFS_EXPORT_PATH_PLACEHOLDER
            readOnly: false
