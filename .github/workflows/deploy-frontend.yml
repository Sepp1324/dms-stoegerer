name: deploy-frontend-only

# Manueller, gezielter Frontend-Deploy (nur UI-Image, Backend bleibt auf aktueller Version).
# Use-Case: UI-Modernisierung (STOAA-415/417/430/431) deployen, ohne das Backend anzufassen
# (z.B. nach Rollback auf stabile Backend-Version 0.5.0 — STOAA-497/499).
#
# Läuft auf self-hosted Runner "dms" (Heimnetz) mit Zugriff auf Registry + kubectl.
#
# Akzeptierte Nebenwirkung (bekannt, CTO-Entscheidung):
# - main-Frontend enthält Nav-Features (Workflows, Wiedervorlage) + DocumentDetail-Tabs
#   (Versionen/Audit/Erinnerungen), deren Backend-Endpunkte in älteren Backend-Versionen
#   (z.B. 0.5.0, Migrationen <0015) fehlen → diese 404en, zeigen aber saubere Fehlerzustände.
# - Die Kern-UI-Modernisierung (Sidebar/Tokens/Layout/Tabs) ist reine Präsentation und voll funktional.

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Git-SHA oder Tag für das Frontend-Image (default: aktueller main-HEAD)'
        required: false
        default: ''

concurrency:
  group: deploy-frontend-only
  cancel-in-progress: false

# Pflegt den frontend-newTag auf dem GitOps-Branch cluster-state → Schreibrecht.
permissions:
  contents: write

env:
  REGISTRY: registry.stoegerer-home.at
  KUBECONFIG: /etc/rancher/k3s/k3s.yaml

jobs:
  deploy-frontend:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Falls git_sha angegeben wurde, diesen SHA auschecken; sonst main-HEAD.
          ref: ${{ github.event.inputs.git_sha || 'main' }}

      - name: Image-Tag bestimmen
        # Der manuelle Input wird NICHT in Shell-Code interpoliert (Injection),
        # sondern nur als Env-Variable übergeben und strikt validiert.
        env:
          INPUT_GIT_SHA: ${{ github.event.inputs.git_sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_GIT_SHA}" ]; then
            if ! printf '%s' "${INPUT_GIT_SHA}" | grep -qE '^[A-Za-z0-9._/-]+$'; then
              echo "FEHLER: Ungültiger git_sha-Input (nur [A-Za-z0-9._/-] erlaubt)."
              exit 1
            fi
            TAG="${INPUT_GIT_SHA}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Deploying frontend with tag: $TAG"

      - name: Runner-Speicher freihalten
        run: |
          docker image prune -f || true
          docker image prune -af --filter "until=48h" || true
          docker builder prune -f --filter "until=24h" || true
          df -h . || true

      - name: Frontend-Image bauen
        run: docker build -t "$REGISTRY/dms-frontend:$TAG" ./frontend

      - name: Frontend-Image pushen
        run: docker push "$REGISTRY/dms-frontend:$TAG"

      - name: Push verifizieren (Frontend-Image wirklich in der Registry)
        run: |
          set -euo pipefail
          # Medientyp-agnostisch: docker manifest inspect (--insecure für self-signed),
          # Fallback tags/list-API (anonym).
          ref="${REGISTRY}/dms-frontend:${TAG}"
          if docker manifest inspect "$ref" >/dev/null 2>&1 \
             || docker manifest inspect --insecure "$ref" >/dev/null 2>&1 \
             || curl -sk "https://${REGISTRY}/v2/dms-frontend/tags/list" | grep -q "\"${TAG}\""; then
            echo "OK: ${ref} vorhanden."
          else
            echo "FEHLER: ${ref} nach dem Push nicht auffindbar – Abbruch."
            exit 1
          fi

      - name: Frontend-Deployment Image aktualisieren (OHNE apply -k)
        run: |
          set -euo pipefail
          echo "Aktualisiere Frontend-Deployment auf Tag $TAG (Backend/Worker/Beat bleiben unangetastet)"
          kubectl -n dms set image deploy/frontend frontend="$REGISTRY/dms-frontend:$TAG"

      - name: Frontend-Rollout abwarten
        run: kubectl -n dms rollout status deploy/frontend --timeout=180s

      - name: Frontend-newTag auf GitOps-Branch cluster-state pflegen (nur Frontend)
        # Setzt AUF cluster-state auf (dort steht der ECHTE, zuletzt deployte
        # Backend-Tag) und bumpt NUR den Frontend-Tag -> das Backend-Tag bleibt
        # erhalten (Entkopplung). Existiert cluster-state noch nicht, von main
        # starten. main bleibt unangetastet/geschützt. `[skip ci]` verhindert
        # erneutes Triggern.
        run: |
          set -euo pipefail
          git fetch origin cluster-state main || git fetch origin main
          git checkout -B _fe_tagbump origin/cluster-state 2>/dev/null \
            || git checkout -B _fe_tagbump origin/main
          f=deploy/k8s/base/kustomization.yaml
          python3 - "$f" "$TAG" <<'PY'
          import re, sys
          path, tag = sys.argv[1], sys.argv[2]
          s = open(path).read()
          s = re.sub(
              r'(name: registry\.stoegerer-home\.at/dms-frontend\n\s*newTag:\s*)"[^"]*"',
              r'\g<1>"' + tag + '"', s)
          open(path, "w").write(s)
          PY
          if git diff --quiet -- "$f"; then
            echo "frontend-newTag bereits ${TAG} – kein Commit nötig."
            exit 0
          fi
          git config user.name  "dms-deploy-bot"
          git config user.email "deploy-bot@stoegerer-dms.local"
          git add "$f"
          git commit -m "chore(deploy): frontend newTag -> ${TAG} [skip ci]"
          # NON-FATAL: Frontend-Rollout war bereits erfolgreich. cluster-state ist
          # bot-verwaltet -> Force-Push (aufsetzend, daher meist FF).
          if git push -f origin _fe_tagbump:cluster-state; then
            echo "cluster-state Frontend-Tag -> ${TAG}."
          else
            echo "::warning::Push nach cluster-state fehlgeschlagen. Rollout war erfolgreich; vor apply -k deploy/k8s/verify-image-tags.sh laufen lassen."
          fi

      - name: Rollout-Diagnose (bei Timeout/Fehler)
        if: failure()
        run: |
          echo "=== Frontend-Pods ==="
          kubectl -n dms get pods -l app=frontend -o wide
          echo ""
          echo "=== Frontend-Pod describe ==="
          kubectl -n dms get pods -l app=frontend -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms describe "$pod"
            echo ""
          done
          echo "=== Frontend-Logs ==="
          kubectl -n dms get pods -l app=frontend -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms logs "$pod" --tail=100 || echo "(keine Logs verfügbar)"
            echo ""
          done

      - name: Zusammenfassung
        if: always()
        run: |
          echo "### Frontend-Deploy $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployments:**" >> "$GITHUB_STEP_SUMMARY"
          kubectl -n dms get deploy -o wide >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Frontend-Pods:**" >> "$GITHUB_STEP_SUMMARY"
          kubectl -n dms get pods -l app=frontend -o wide >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
