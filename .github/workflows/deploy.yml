name: build-and-deploy

# Läuft beim Merge/Push nach main auf einem self-hosted Runner im Heimnetz
# (Label "dms"). Der Runner hat Zugriff auf Docker, die Registry und den
# k3s-Cluster. Ablauf: Django-Check → Images bauen (Git-SHA-Tag) → pushen →
# Manifeste rendern, Tags ersetzen, anwenden → Rollout abwarten.
#
# Einrichtung des Runners: siehe docs/ci-cd.md

on:
  push:
    branches: [main]

# GEMEINSAME Concurrency-Gruppe mit deploy-frontend.yml: serialisiert ALLE
# Deploys (Voll + Frontend-only), damit sie den GitOps-Branch cluster-state nie
# gleichzeitig schreiben (sonst gewinnt der letzte Force-Push, evtl. mit älterem
# Ausgangsstand). Kein Cancel – laufendes Rollout fertigmachen.
concurrency:
  group: dms-deploy
  cancel-in-progress: false

# Der Deploy-Job pusht den gepflegten kustomization-newTag auf den GitOps-Branch
# cluster-state (damit `apply -k` nie auf ein Geister-Image zeigt) → Schreibrecht.
permissions:
  contents: write

env:
  REGISTRY: registry.stoegerer-home.at
  # Deploy-Identität: die namespacebeschränkte SA-Kubeconfig (dms-deployer), NICHT
  # die cluster-admin-Kubeconfig. Der Pfad kommt aus der Actions-Variable
  # DMS_KUBECONFIG (Repo → Settings → Actions → Variables), die der Betreiber beim
  # Setup auf die 0600-SA-Kubeconfig zeigen lässt (docs/ci-cd.md §1). BEWUSST kein
  # Fallback auf /etc/rancher/k3s/k3s.yaml – ein leerer Wert soll hart scheitern,
  # statt heimlich mit Admin-Rechten zu deployen.
  KUBECONFIG: ${{ vars.DMS_KUBECONFIG }}
  # STOAA-450: NFS-Konfiguration aus Secrets (nicht im Repo)
  NFS_SERVER: ${{ secrets.NFS_SERVER }}
  NFS_EXPORT_PATH: ${{ secrets.NFS_EXPORT_PATH }}

jobs:
  deploy:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: KUBECONFIG (SA, least privilege) prüfen
        # Verbindlich auf die namespacebeschränkte dms-deployer-Kubeconfig. Kein
        # stiller Fallback auf die Admin-Kubeconfig: leerer Pfad oder ein Pfad in
        # /etc/rancher/k3s/ bricht hier hart ab.
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG:-}" ] || [ ! -r "${KUBECONFIG}" ]; then
            echo "::error::Actions-Variable DMS_KUBECONFIG nicht gesetzt oder Datei nicht lesbar."
            echo "Erwartet: Pfad zur 0600-SA-Kubeconfig (dms-deployer). Siehe docs/ci-cd.md §1."
            exit 1
          fi
          case "${KUBECONFIG}" in
            /etc/rancher/k3s/*)
              echo "::error::KUBECONFIG zeigt auf die k3s-Admin-Kubeconfig – bitte die SA-Kubeconfig verwenden."
              exit 1;;
          esac
          echo "Deploy-Kontext: $(kubectl config current-context)"

      - name: Image-Tag = Git-SHA
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Stable Secrets prüfen
        run: scripts/verify-stable-secrets.sh

      # Der Deploy lässt die gepushten dms-backend/-frontend:<TAG>-Images lokal auf
      # dem self-hosted Runner liegen. Seit das Backend-Image das ~2,5-GB-Embedding-
      # Modell mitbringt, füllen wenige alte Tags die Platte (No space left on
      # device). Deshalb ALLE ungenutzten Images entfernen (nicht nur >48h) – die
      # Registry ist die Quelle der Wahrheit, der Cluster zieht von dort. Der
      # BUILD-Cache bleibt bewusst unangetastet (`builder prune` nur alter Cache),
      # damit die Modell-Bake-Layer erhalten bleibt und nicht jeder Deploy das
      # Modell neu herunterlädt.
      - name: Runner-Speicher freihalten
        run: |
          docker image prune -af || true
          docker builder prune -f --filter "until=72h" || true
          df -h . || true

      - name: Images bauen
        run: |
          set -euo pipefail
          docker build -t "$REGISTRY/dms-backend:$TAG"  ./backend
          docker build -t "$REGISTRY/dms-frontend:$TAG" ./frontend

      - name: Django-Check (im frischen Backend-Image)
        run: docker run --rm "$REGISTRY/dms-backend:$TAG" python manage.py check

      - name: Testsuite + Migrations-Check (Deploy-Gate)
        # Zweites Sicherheitsnetz neben dem PR-Gate (pr-checks.yml): fängt direkte
        # Pushes nach main ab. Roter Test → kein Push, kein Rollout.
        run: backend/ci/run-tests.sh "$REGISTRY/dms-backend:$TAG"

      - name: Images pushen
        run: |
          set -euo pipefail
          docker push "$REGISTRY/dms-backend:$TAG"
          docker push "$REGISTRY/dms-frontend:$TAG"

      - name: Push verifizieren (Images wirklich in der Registry)
        # Kernabsicherung: erst weiter (Rollout + newTag-Bump), wenn BEIDE Images
        # unter $TAG tatsächlich per Registry-API abrufbar sind. Verhindert, dass
        # ein fehlgeschlagener/teilweiser Push später als Geister-Tag deployt wird.
        run: |
          set -euo pipefail
          # Medientyp-agnostisch (OCI vs. docker schema2 – buildkit pusht OCI):
          # docker manifest inspect (--insecure für self-signed), Fallback tags/list.
          verify() {
            local img="$1" tag="$2" ref="${REGISTRY}/$1:$2"
            if docker manifest inspect "$ref" >/dev/null 2>&1; then return 0; fi
            if docker manifest inspect --insecure "$ref" >/dev/null 2>&1; then return 0; fi
            if curl -sk "https://${REGISTRY}/v2/${img}/tags/list" | grep -q "\"${tag}\""; then return 0; fi
            return 1
          }
          for img in dms-backend dms-frontend; do
            if verify "$img" "$TAG"; then
              echo "OK: ${REGISTRY}/${img}:${TAG} vorhanden."
            else
              echo "FEHLER: ${REGISTRY}/${img}:${TAG} nach dem Push nicht auffindbar – Abbruch vor Rollout/newTag-Bump."
              exit 1
            fi
          done

      - name: Manifeste rendern, Tags ersetzen, anwenden
        run: |
          set -euo pipefail
          # STOAA-460: Guard gegen leere NFS-Secrets (sonst landen leere Werte in den Manifesten)
          if [ -z "${NFS_SERVER:-}" ] || [ -z "${NFS_EXPORT_PATH:-}" ]; then
            echo "FEHLER: NFS_SERVER und NFS_EXPORT_PATH müssen als GitHub-Repo-Secrets gesetzt sein."
            echo "NFS_SERVER='${NFS_SERVER:-}'"
            echo "NFS_EXPORT_PATH='${NFS_EXPORT_PATH:-}'"
            exit 1
          fi
          # STOAA-450: Deploy consume-nfs Overlay (statt Basis) → NFS-Volume + securityContext
          # + CONSUME_FOLDER_PATH + CONSUME_PER_USER landen im Cluster (kein Drift mehr).
          # NFS-Server-IP/Pfad aus Secrets injizieren (nicht im Repo).
          kubectl kustomize deploy/k8s/overlays/consume-nfs \
            | sed -E "s#(image: ${REGISTRY}/dms-backend):[^[:space:]]+#\1:${TAG}#g; \
                      s#(image: ${REGISTRY}/dms-frontend):[^[:space:]]+#\1:${TAG}#g; \
                      s#NFS_SERVER_PLACEHOLDER#${NFS_SERVER}#g; \
                      s#NFS_EXPORT_PATH_PLACEHOLDER#${NFS_EXPORT_PATH}#g" \
            | kubectl apply -f -

      - name: Rollout abwarten
        run: |
          set -euo pipefail
          kubectl -n dms rollout status deploy/backend  --timeout=240s
          kubectl -n dms rollout status deploy/worker   --timeout=240s
          kubectl -n dms rollout status deploy/beat     --timeout=180s
          kubectl -n dms rollout status deploy/frontend --timeout=180s

      - name: kustomization newTag setzen + auf GitOps-Branch cluster-state pushen
        # Läuft NUR nach erfolgreichem, verifiziertem Rollout. Setzt beide
        # dms-*-newTags in der Basis-kustomization auf den frisch gebauten,
        # gepushten und verifizierten $TAG und pusht das Ergebnis auf den
        # DEDIZIERTEN GitOps-Branch ``cluster-state`` (nicht auf branch-protected
        # main). Dieser Branch ist die Cluster-Wahrheit; `apply -k` MUSS von dort
        # erfolgen (docs/ci-cd.md) -> kein Rückroll auf ein Geister-/altes Image.
        run: |
          set -euo pipefail
          f=deploy/k8s/base/kustomization.yaml
          python3 - "$f" "$TAG" <<'PY'
          import re, sys
          path, tag = sys.argv[1], sys.argv[2]
          s = open(path).read()
          for img in ("dms-backend", "dms-frontend"):
              s = re.sub(
                  r'(name: registry\.stoegerer-home\.at/%s\n\s*newTag:\s*)"[^"]*"' % img,
                  r'\g<1>"' + tag + '"', s)
          open(path, "w").write(s)
          PY
          if git diff --quiet -- "$f"; then
            echo "newTag bereits ${TAG} – kein Commit nötig."
            exit 0
          fi
          git config user.name  "dms-deploy-bot"
          git config user.email "deploy-bot@stoegerer-dms.local"
          git add "$f"
          git commit -m "chore(deploy): kustomization newTag -> ${TAG} [skip ci]"
          # Push auf den dedizierten, UNGESCHÜTZTEN GitOps-Branch cluster-state –
          # NICHT auf das branch-protected main. HEAD ist der gerade deployte
          # main-Commit + dieser Bump; cluster-state spiegelt damit IMMER den
          # zuletzt erfolgreich deployten Stand (die Cluster-Wahrheit). main bleibt
          # unverändert/geschützt; kein Branch-Protection-Bypass/Secret nötig.
          #
          # --force-with-lease statt -f: überschreibt cluster-state nur, wenn er
          # noch dem erwarteten Stand entspricht (Netz gegen einen konkurrierenden
          # Push, den die gemeinsame Concurrency-Gruppe zusätzlich verhindert). Der
          # Inhalt ist base-unabhängig (deployter main + beide Tags), daher genügt
          # bei einem Lease-Konflikt Neuladen + erneut. Scheitert es endgültig,
          # ist der GitOps-Stand veraltet -> FEHLER (exit 1), nicht nur Warnung.
          git fetch origin cluster-state || true
          pushed=0
          for attempt in 1 2 3; do
            if git ls-remote --exit-code origin cluster-state >/dev/null 2>&1; then
              git push --force-with-lease origin HEAD:cluster-state && { pushed=1; break; }
            else
              git push origin HEAD:cluster-state && { pushed=1; break; }  # erstmalig anlegen
            fi
            echo "cluster-state-Push (Versuch ${attempt}) abgelehnt – neu laden und erneut..."
            git fetch origin cluster-state || true
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::cluster-state konnte nicht auf ${TAG} aktualisiert werden – GitOps-Stand veraltet (Deploy lief, aber apply -k würde alte Tags nutzen)."
            exit 1
          fi
          echo "cluster-state auf ${TAG} aktualisiert (deployter main + newTag-Bump)."

      - name: Rollout-Diagnose (bei Timeout/Fehler)
        if: failure()
        run: |
          echo "=== Pod-Übersicht ==="
          kubectl -n dms get pods -o wide
          echo ""
          echo "=== Nicht-ready Pods (describe) ==="
          kubectl -n dms get pods --field-selector=status.phase!=Running -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms describe "$pod"
            echo ""
          done
          echo "=== Letzte Logs (nicht-ready Pods) ==="
          kubectl -n dms get pods --field-selector=status.phase!=Running -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms logs "$pod" --tail=50 --all-containers=true || echo "(keine Logs verfügbar)"
            echo ""
          done

      - name: Zusammenfassung
        if: always()
        run: |
          echo "### Deploy $TAG" >> "$GITHUB_STEP_SUMMARY"
          kubectl -n dms get pods -o wide >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
