name: build-and-deploy

# Läuft beim Merge/Push nach main auf einem self-hosted Runner im Heimnetz
# (Label "dms"). Der Runner hat Zugriff auf Docker, die Registry und den
# k3s-Cluster. Ablauf: Django-Check → Images bauen (Git-SHA-Tag) → pushen →
# Manifeste rendern, Tags ersetzen, anwenden → Rollout abwarten.
#
# Einrichtung des Runners: siehe docs/ci-cd.md

on:
  push:
    branches: [main]

# Nie zwei Deploys gleichzeitig (kein Cancel – laufendes Rollout fertigmachen).
concurrency:
  group: deploy-main
  cancel-in-progress: false

# Der Deploy-Job committet den gepflegten kustomization-newTag zurück nach main
# (damit `apply -k` nie auf ein Geister-Image zeigt) → Schreibrecht nötig.
permissions:
  contents: write

env:
  REGISTRY: registry.stoegerer-home.at
  # k3s legt die Kubeconfig hier ab; der Runner-Nutzer braucht Lesezugriff.
  KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  # STOAA-450: NFS-Konfiguration aus Secrets (nicht im Repo)
  NFS_SERVER: ${{ secrets.NFS_SERVER }}
  NFS_EXPORT_PATH: ${{ secrets.NFS_EXPORT_PATH }}

jobs:
  deploy:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image-Tag = Git-SHA
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Stable Secrets prüfen
        run: scripts/verify-stable-secrets.sh

      - name: Images bauen
        run: |
          set -euo pipefail
          docker build -t "$REGISTRY/dms-backend:$TAG"  ./backend
          docker build -t "$REGISTRY/dms-frontend:$TAG" ./frontend

      - name: Django-Check (im frischen Backend-Image)
        run: docker run --rm "$REGISTRY/dms-backend:$TAG" python manage.py check

      - name: Testsuite + Migrations-Check (Deploy-Gate)
        # Zweites Sicherheitsnetz neben dem PR-Gate (pr-checks.yml): fängt direkte
        # Pushes nach main ab. Roter Test → kein Push, kein Rollout.
        run: backend/ci/run-tests.sh "$REGISTRY/dms-backend:$TAG"

      - name: Images pushen
        run: |
          set -euo pipefail
          docker push "$REGISTRY/dms-backend:$TAG"
          docker push "$REGISTRY/dms-frontend:$TAG"

      - name: Push verifizieren (Images wirklich in der Registry)
        # Kernabsicherung: erst weiter (Rollout + newTag-Bump), wenn BEIDE Images
        # unter $TAG tatsächlich per Registry-API abrufbar sind. Verhindert, dass
        # ein fehlgeschlagener/teilweiser Push später als Geister-Tag deployt wird.
        run: |
          set -euo pipefail
          # Medientyp-agnostisch (OCI vs. docker schema2 – buildkit pusht OCI):
          # docker manifest inspect (--insecure für self-signed), Fallback tags/list.
          verify() {
            local img="$1" tag="$2" ref="${REGISTRY}/$1:$2"
            if docker manifest inspect "$ref" >/dev/null 2>&1; then return 0; fi
            if docker manifest inspect --insecure "$ref" >/dev/null 2>&1; then return 0; fi
            if curl -sk "https://${REGISTRY}/v2/${img}/tags/list" | grep -q "\"${tag}\""; then return 0; fi
            return 1
          }
          for img in dms-backend dms-frontend; do
            if verify "$img" "$TAG"; then
              echo "OK: ${REGISTRY}/${img}:${TAG} vorhanden."
            else
              echo "FEHLER: ${REGISTRY}/${img}:${TAG} nach dem Push nicht auffindbar – Abbruch vor Rollout/newTag-Bump."
              exit 1
            fi
          done

      - name: Manifeste rendern, Tags ersetzen, anwenden
        run: |
          set -euo pipefail
          # STOAA-460: Guard gegen leere NFS-Secrets (sonst landen leere Werte in den Manifesten)
          if [ -z "${NFS_SERVER:-}" ] || [ -z "${NFS_EXPORT_PATH:-}" ]; then
            echo "FEHLER: NFS_SERVER und NFS_EXPORT_PATH müssen als GitHub-Repo-Secrets gesetzt sein."
            echo "NFS_SERVER='${NFS_SERVER:-}'"
            echo "NFS_EXPORT_PATH='${NFS_EXPORT_PATH:-}'"
            exit 1
          fi
          # STOAA-450: Deploy consume-nfs Overlay (statt Basis) → NFS-Volume + securityContext
          # + CONSUME_FOLDER_PATH + CONSUME_PER_USER landen im Cluster (kein Drift mehr).
          # NFS-Server-IP/Pfad aus Secrets injizieren (nicht im Repo).
          kubectl kustomize deploy/k8s/overlays/consume-nfs \
            | sed -E "s#(image: ${REGISTRY}/dms-backend):[^[:space:]]+#\1:${TAG}#g; \
                      s#(image: ${REGISTRY}/dms-frontend):[^[:space:]]+#\1:${TAG}#g; \
                      s#NFS_SERVER_PLACEHOLDER#${NFS_SERVER}#g; \
                      s#NFS_EXPORT_PATH_PLACEHOLDER#${NFS_EXPORT_PATH}#g" \
            | kubectl apply -f -

      - name: Rollout abwarten
        run: |
          set -euo pipefail
          kubectl -n dms rollout status deploy/backend  --timeout=240s
          kubectl -n dms rollout status deploy/worker   --timeout=240s
          kubectl -n dms rollout status deploy/beat     --timeout=180s
          kubectl -n dms rollout status deploy/frontend --timeout=180s

      - name: kustomization newTag auf verifizierten SHA setzen + zurückcommitten
        # Läuft NUR nach erfolgreichem, verifiziertem Rollout. Setzt beide
        # dms-*-newTags in der Basis-kustomization auf den frisch gebauten,
        # gepushten und verifizierten $TAG. Damit spiegelt die kustomization den
        # echten Cluster-Stand → ein manuelles `kubectl apply -k` kann nie mehr
        # auf ein nicht existierendes Image zeigen. `[skip ci]` verhindert, dass
        # der Bump-Commit diesen Workflow erneut auslöst (Endlosschleife).
        run: |
          set -euo pipefail
          f=deploy/k8s/base/kustomization.yaml
          python3 - "$f" "$TAG" <<'PY'
          import re, sys
          path, tag = sys.argv[1], sys.argv[2]
          s = open(path).read()
          for img in ("dms-backend", "dms-frontend"):
              s = re.sub(
                  r'(name: registry\.stoegerer-home\.at/%s\n\s*newTag:\s*)"[^"]*"' % img,
                  r'\g<1>"' + tag + '"', s)
          open(path, "w").write(s)
          PY
          if git diff --quiet -- "$f"; then
            echo "newTag bereits ${TAG} – kein Commit nötig."
            exit 0
          fi
          git config user.name  "dms-deploy-bot"
          git config user.email "deploy-bot@stoegerer-dms.local"
          git add "$f"
          git commit -m "chore(deploy): kustomization newTag -> ${TAG} [skip ci]"
          # HEAD ist der gerade deployte main-Commit (+ dieser Bump); dank
          # concurrency-Serialisierung ist main-Tip == deployter Commit → FF-Push.
          # NON-FATAL: Der Deploy (Rollout) war bereits erfolgreich. Scheitert der
          # Rückcommit (z. B. Branch-Protection auf main), darf der Job NICHT rot
          # werden – wir warnen nur. Damit die kustomization automatisch gepflegt
          # wird, muss der Owner "dms-deploy-bot"/GitHub-Actions in den
          # Branch-Protection-Bypass aufnehmen; sonst bleibt newTag manuell
          # (Preflight: deploy/k8s/verify-image-tags.sh vor `apply -k`).
          if git push origin HEAD:main; then
            echo "kustomization newTag -> ${TAG} nach main committet."
          else
            echo "::warning::newTag-Bump konnte nicht nach main gepusht werden (Branch-Protection?). Deploy war erfolgreich; kustomization.newTag bleibt unverändert."
          fi

      - name: Rollout-Diagnose (bei Timeout/Fehler)
        if: failure()
        run: |
          echo "=== Pod-Übersicht ==="
          kubectl -n dms get pods -o wide
          echo ""
          echo "=== Nicht-ready Pods (describe) ==="
          kubectl -n dms get pods --field-selector=status.phase!=Running -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms describe "$pod"
            echo ""
          done
          echo "=== Letzte Logs (nicht-ready Pods) ==="
          kubectl -n dms get pods --field-selector=status.phase!=Running -o name | while read pod; do
            echo "--- $pod ---"
            kubectl -n dms logs "$pod" --tail=50 --all-containers=true || echo "(keine Logs verfügbar)"
            echo ""
          done

      - name: Zusammenfassung
        if: always()
        run: |
          echo "### Deploy $TAG" >> "$GITHUB_STEP_SUMMARY"
          kubectl -n dms get pods -o wide >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
