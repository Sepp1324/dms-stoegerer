name: ci

# Dynamisches Grün-Signal für Backend-PRs: baut das Backend-Image und führt
# darin die Testsuite + Migrations-Check gegen eine wegwerfbare Postgres aus.
# Ein roter Test blockt (via Branch-Protection) den Merge – und damit den
# Deploy, der erst beim Push nach main läuft (siehe deploy.yml).
#
# Läuft auf demselben self-hosted Runner wie der Deploy (Label "dms"), weil nur
# der Docker + Registry-Zugriff hat. Siehe docs/ci-cd.md.

on:
  pull_request:
  push:
    branches: [main]

# Pro Branch/PR nur ein Lauf – ältere Läufe abbrechen, Ressourcen sparen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend-Image bauen (flüchtiger CI-Tag)
        run: docker build -t "dms-backend-ci:${GITHUB_SHA}" ./backend

      - name: Testsuite + Migrations-Check
        run: backend/ci/run-tests.sh "dms-backend-ci:${GITHUB_SHA}"

      - name: CI-Image aufräumen
        if: always()
        run: docker rmi "dms-backend-ci:${GITHUB_SHA}" 2>/dev/null || true
