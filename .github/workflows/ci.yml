name: ci

# Dynamisches Grün-Signal für PRs. Zwei Jobs, beide blocken (via
# Branch-Protection) den Merge – und damit den Deploy, der erst beim Push nach
# main läuft (siehe deploy.yml):
#   * backend-tests  – baut das Backend-Image und führt darin die Testsuite +
#     Migrations-Check gegen eine wegwerfbare Postgres aus.
#   * frontend-build – baut das Frontend-Image (npm install + `tsc -b && vite
#     build`) mit demselben Dockerfile wie der Deploy. Fängt Typfehler und
#     unaufgelöste Merge-Konflikt-Marker VOR dem Merge ab – bis STOAA-86 lief
#     `tsc/vite` nur im Post-Merge-Deploy, sodass ein kaputter Frontend-Build
#     unbemerkt auf main landen konnte (siehe STOAA-85).
#
# Läuft auf demselben self-hosted Runner wie der Deploy (Label "dms"), weil nur
# der Docker + Registry-Zugriff hat. Siehe docs/ci-cd.md.

on:
  pull_request:
  push:
    branches: [main]

# Pro Branch/PR nur ein Lauf – ältere Läufe abbrechen, Ressourcen sparen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backend-Image bauen (flüchtiger CI-Tag)
        run: docker build -t "dms-backend-ci:${GITHUB_SHA}" ./backend

      - name: Testsuite + Migrations-Check
        run: backend/ci/run-tests.sh "dms-backend-ci:${GITHUB_SHA}"

      - name: CI-Image aufräumen
        if: always()
        run: docker rmi "dms-backend-ci:${GITHUB_SHA}" 2>/dev/null || true

  frontend-build:
    runs-on: [self-hosted, dms]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Baut mit demselben Dockerfile wie der Deploy (build-Stufe: npm install +
      # `npm run build` = `tsc -b && vite build`). Ein Typ- oder Konfliktmarker-
      # Fehler bricht `docker build` mit exit 1 → roter PR-Check → kein Merge.
      # Parität zum Deploy garantiert: identischer Build-Befehl.
      - name: Frontend-Image bauen (flüchtiger CI-Tag)
        run: docker build -t "dms-frontend-ci:${GITHUB_SHA}" ./frontend

      - name: CI-Image aufräumen
        if: always()
        run: docker rmi "dms-frontend-ci:${GITHUB_SHA}" 2>/dev/null || true
